<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DevOps Task Tracker</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6fb;
            color: #1f2937;
        }

        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            margin-bottom: 8px;
            font-size: 36px;
        }

        .status {
            color: #64748b;
            font-size: 14px;
        }

        .add-form {
            display: flex;
            gap: 10px;
            max-width: 600px;
            margin: 0 auto 30px;
        }

        .add-form input {
            flex: 1;
            padding: 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 16px;
        }

        .add-form button {
            padding: 14px 22px;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        .board {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .column {
            background: white;
            padding: 20px;
            border-radius: 18px;
            box-shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
            min-height: 400px;
        }

        .column h2 {
            margin-top: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .count {
            font-size: 14px;
            background: #e5e7eb;
            padding: 4px 10px;
            border-radius: 999px;
        }

        .task-list {
            min-height: 300px;
            padding: 8px;
            border-radius: 12px;
            transition: background 0.2s ease;
        }

        .task-list.drag-over {
            background: #eff6ff;
        }

        .task-card {
            background: #f8fafc;
            border: 1px solid #e5e7eb;
            padding: 14px;
            margin-bottom: 12px;
            border-radius: 14px;
            cursor: grab;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.15s ease, box-shadow 0.15s ease;
        }

        .task-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 18px rgba(15, 23, 42, 0.08);
        }

        .task-card.dragging {
            opacity: 0.5;
            transform: scale(0.98);
        }

        .task-title {
            font-weight: 600;
        }

        .delete-form button {
            border: none;
            background: #fee2e2;
            color: #b91c1c;
            border-radius: 8px;
            padding: 7px 10px;
            cursor: pointer;
        }

        .empty {
            color: #94a3b8;
            text-align: center;
            margin-top: 40px;
        }

        @media (max-width: 800px) {
            .board {
                grid-template-columns: 1fr;
            }

            .add-form {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>DevOps Task Tracker</h1>
        <div class="status">{{ db_status }}</div>
    </div>

    <form class="add-form" action="/add" method="POST">
        <input type="text" name="title" placeholder="Add a new task..." required>
        <button type="submit">Add Task</button>
    </form>

    <div class="board">
        <div class="column">
            <h2>In Progress <span class="count">{{ in_progress|length }}</span></h2>
            <div class="task-list" data-status="in_progress">
                {% for task in in_progress %}
                    <div class="task-card" draggable="true" data-id="{{ task[0] }}">
                        <span class="task-title">{{ task[1] }}</span>
                        <form class="delete-form" action="/delete/{{ task[0] }}" method="POST">
                            <button type="submit">Delete</button>
                        </form>
                    </div>
                {% else %}
                    <p class="empty">No tasks in progress</p>
                {% endfor %}
            </div>
        </div>

        <div class="column">
            <h2>Done <span class="count">{{ done|length }}</span></h2>
            <div class="task-list" data-status="done">
                {% for task in done %}
                    <div class="task-card" draggable="true" data-id="{{ task[0] }}">
                        <span class="task-title">{{ task[1] }}</span>
                        <form class="delete-form" action="/delete/{{ task[0] }}" method="POST">
                            <button type="submit">Delete</button>
                        </form>
                    </div>
                {% else %}
                    <p class="empty">No completed tasks</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>

<script>
    const cards = document.querySelectorAll(".task-card");
    const lists = document.querySelectorAll(".task-list");

    cards.forEach(card => {
        card.addEventListener("dragstart", () => {
            card.classList.add("dragging");
        });

        card.addEventListener("dragend", () => {
            card.classList.remove("dragging");
        });
    });

    lists.forEach(list => {
        list.addEventListener("dragover", event => {
            event.preventDefault();
            list.classList.add("drag-over");
        });

        list.addEventListener("dragleave", () => {
            list.classList.remove("drag-over");
        });

        list.addEventListener("drop", async event => {
            event.preventDefault();

            const draggingCard = document.querySelector(".dragging");
            if (!draggingCard) return;

            list.classList.remove("drag-over");

            const emptyMessage = list.querySelector(".empty");
            if (emptyMessage) {
                emptyMessage.remove();
            }

            list.appendChild(draggingCard);

            const taskId = draggingCard.dataset.id;
            const newStatus = list.dataset.status;

            await fetch("/update-status", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    id: taskId,
                    status: newStatus
                })
            });

            window.location.reload();
        });
    });
</script>
</body>
</html>
